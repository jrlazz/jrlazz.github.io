<body>
<center><p>INDEX OF SHADERS</p></center>
<img id="fix" src="img_html/makegear.jpg" style="position:absolute;left:-100px;top:0px;height:70px;width:70px;"></img>
<span id="tex" style="position:absolute;left:0px;top:0px;"></span>

<img id="ima" src="img_html/nada.png" style="position:absolute;left:-100px;top:0px;"></img>
<span id="demo"></p>

<script>

var s=[];
var ss="";
var myArray;
var t="";

//ahdn.html,ahdn_no.html,
//chords.html,
//keybd_qua.html,keybd_rra.html,keybd_sen.html,
//keybd_tri.html,
//paintfatB.html,paintfatB1.html,
//stairwaytoheaven.html,

s[1]="aladdin.html,";
s[2]="b8.html,";
s[3]="canvas_7balls.html,";
s[4]="csg_mold.html,csg_mold_gpt5.html,";
s[5]="group_to_mesh_6.html,";
s[6]="instance.html,instanced_shader_texture.html,just_screw.html,";
s[7]="long_play.html,";
s[8]="shader_cj.html,";
s[9]="Steve_living_room.html,";
s[10]="vitrola_1.html,";
s[11]="vomu.html";

for(z=0;z<50;z++){if(s[z]){ss=ss+s[z];}}

myArray = ss.split(",");
//alert(myArray[0]);

for(z=0;z<500;z++){if(myArray[z]){t=t+"<img src='img/ag_baboy_right.png' width=10><a onmouseover='javascript:mika("+z+");' href='https://jrlazz.github.io/anim/" + myArray[z]+"' target='_blank'>"+ myArray[z]+"</a><br>";}}
// OBS: insert alert(myArray["+z+"]); after javascript:
document.getElementById("demo").innerHTML = t;


document.addEventListener('mousemove', function(event) {
	let pageX = event.pageX;
	let pageY = event.pageY;
	document.getElementById("ima").style.left=pageX+"px";
	document.getElementById("ima").style.left="400px";
	document.getElementById("ima").style.top=pageY+"px";
	document.getElementById("ima").style.top=window.pageYOffset+60+"px";
	document.getElementById("tex").style.left="400px";
	document.getElementById("tex").style.top=window.pageYOffset+300+"px";
});

function mika(z){
	document.getElementById("ima").style.left="-100px";
	document.getElementById("ima").style.height="240px";
	document.getElementById("ima").src="img_html/nada.png";
	document.getElementById("tex").innerText="";
	document.getElementById("tex").style.left="400px";

//let text = "Hello.php";
//let result = text.slice(-4); 

let newstr="";
let origstr=myArray[z];

	if(origstr.slice(-4)!=".php"){
		newstr="img_html/"+origstr.substring(0,origstr.length-5)+".jpg";
	}else{
		newstr="img_html/forphp.jpg";
	}
	document.getElementById("ima").src=newstr;
	document.getElementById("tex").innerText=myArray[z];//+" "+z;
}

</script>

</body>
</html>
