	//g=new THREE.SphereGeometry(0.2,16);

scene.add(gruSCREW);

function animate() {
	requestAnimationFrame(animate);
	if(sim==0){
		ango=0;
		for(let z=2;z<360;z++){// 1160
			ango=ango+0.06;
			axe[z]=cxe[1].clone();
			axe[z].rotation.x=ango;
			axe[z].position.x=ango/6.45;// 9
			spring[1].add(axe[z]);
		}
		spring[1].position.x=-1.7;;//1.85

		//singleMesh=mergeGroupToMesh(spring[1]);
		//singleMesh.material=mat[1];
		//singleMesh.position.x=20;
		//scene.add(singleMesh);

		//t=singleMesh.clone();
		t=spring[1].clone();
		t.position.x=-17.4;
		t.rotation.set(p/2+1.8,0,0);
			gruNUT.add(t);
		//t=singleMesh.clone();
		t=spring[1].clone();
		t.position.x=-20.4;
		t.rotation.set(p/2+1.8,0,0);

		//t=singleMesh.clone();

			gruNUT.add(t);

		//const singleMesh2=mergeGroupToMesh(gruNUT);
		//singleMesh2.position.x=-8;
		//scene.add(singleMesh2);
		sim=1;
	}

// **************** CSG 

	if(bM[1] && bM[2] && w==0){apply();w=1;}

	function apply(){
	 	// You can subtract,union or intersect
		faz(bM[1],bM[2],1,"sub"); // subtract bM[1] and bM[2]
	}

	function faz(r,s,t,u){
		m=CSG;g=r.geometry;
		bCSG=CSG.fromMesh(r,0);
		bCSG2=CSG.fromMesh(s,0);
		if(u=="uni"){bCSG=bCSG.union(bCSG2);}
		if(u=="sub"){bCSG=bCSG.subtract(bCSG2);}
		res[t]=CSG.toMesh(bCSG,r.matrix,[r.material,s.material]);
		res[t].geometry.computeVertexNormals();
		res[t].updateMatrix();res[t].updateMatrixWorld();
		scene.remove(r);
		scene.remove(s);
		scene.add(res[t]);
		//alert("fiz_A");
	}

	if(spring[1] && ww==0){
		final.add(spring[1]);
		//final.add(singleMesh);
		final.add(res[1]);
		//final.position.x=-12;
		scene.add(final);
		ww=1;
	}

	if(ww=1){
		final.rotation.x -=0.1;
		final.position.x -=0.1;
		gruSCREW.rotation.x +=0.1;
		gruNUT.rotation.x +=0.1;
		if(final.position.x<-14){volta();}
	}
function volta(){
	final.position.x=2;
}

function mergeGroupToMesh(group){
	const geometries=[];
	group.updateMatrixWorld(true);
	group.traverse((child) => {
		if(child.isMesh){
			const geometry=child.geometry.clone();
			geometry.applyMatrix4(child.matrixWorld);
			geometries.push(geometry);
		}
	});
	if(geometries.length === 0) return null;
	const mergedGeometry=BufferGeometryUtils.mergeGeometries(geometries,false);
	const mergedMesh=new THREE.Mesh(mergedGeometry,mat[4]);
	return mergedMesh;
}

	controls.update();
	renderer.render(scene,camera);

}

function onWindowResize(){
	camera.aspect=window.innerWidth/window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize(window.innerWidth,window.innerHeight);
}
