<style>
body{overflow:hidden;margin:0px;background-color:#369;font-family:Monospace;}
span{position:absolute;font-size:15pt;}
</style>

<script type="importmap">
	{
		"imports":{
	"three":"https://unpkg.com/three@0.164.0/build/three.module.js",
	"three/addons/":"https://unpkg.com/three@0.164.0/examples/jsm/"
		}
	}
</script>

</head>

<body>
<span style="left:10px;top:10px;color:#ff0;">just screw</SPAN>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import CSG from "../js/new_csg.js";

var renderer,scene,camera,loader,controls,g,m,s,bCSG,bCSG2;;
var luz=[];
var axe=[];
var mat=[];

var ango=0;
var diam=0;
var sim=0;
var p=Math.PI;
var spring=new THREE.Group();
var v=0;
var w=0;

let bM=[];
let res=[];
let outer,inner,result;

function init() {

	scene=new THREE.Scene();
	camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,1,1000,1);
	camera.position.set(-30,15,30);

	renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
	renderer.setSize(window.innerWidth,window.innerHeight);
	renderer.setClearColor(0x006699,0);
	renderer.colorSpace=THREE.SRGBColorSpace;
	document.body.appendChild(renderer.domElement);
	window.addEventListener( 'resize',onWindowResize );

	controls=new OrbitControls(camera,renderer.domElement);
	
	luz[1]=new THREE.AmbientLight("#fff",3);scene.add(luz[1]);
	luz[2]=new THREE.PointLight("#fff",15000);luz[2].position.set(40,10,0);scene.add(luz[2]);
	luz[3]=new THREE.PointLight("#fff",15000);luz[3].position.set(-40,-10,0);scene.add(luz[3]);

	mat[1]=new THREE.MeshStandardMaterial({color:'#860',metalness:0.7,roughness:0.2});

	// tooth ini
	axe[1]=new THREE.AxesHelper(0.0001);
	g=new THREE.BoxGeometry(0.7,0.7,0.5);
	s=new THREE.Mesh(g,mat[1]);
	s.rotation.set(0,0,p/4);
	s.position.y=3.8;
	axe[1].add(s);
	// tooth end

	// screw ini
	// Outer body
	g=new THREE.CylinderGeometry(5,2.4,3,128);
	bM[2]=new THREE.Mesh(g);
	bM[2].rotation.z=p/2;
	bM[2].updateMatrix();
		// Inner hole
		g=new THREE.CylinderGeometry(2,2,4,5);
		bM[1]=new THREE.Mesh(g);
		bM[1].rotation.z=p/2;
		bM[1].updateMatrix();
	// CSG
	outer=CSG.fromMesh(bM[2]);
	inner=CSG.fromMesh(bM[1]);
	result=outer.subtract(inner);
	res[1]=CSG.toMesh(result,bM[2].matrix,mat[1]);
	res[1].geometry.computeVertexNormals();
	res[1].position.x=-15;
	scene.add(res[1]);

	g=new THREE.CylinderGeometry(2.4,1.2,28);
	s=new THREE.Mesh(g,mat[1]);
	s.rotation.set(0,0,p/2);
	scene.add(s);

	g=new THREE.CylinderGeometry(1.2,0.1,5);
	s=new THREE.Mesh(g,mat[1]);
	s.rotation.set(0,0,p/2);
	s.position.set(16.5,0,0);
	scene.add(s);

	// screw end
}

function animate() {
	requestAnimationFrame(animate);
	if(sim==0){
		ango=0;
		diam=1;
		for(let z=2;z<3000;z++){
			ango=ango+0.06;
			diam=(3000-z)/3000;
			axe[z]=axe[1].clone();
			axe[z].rotation.x=ango;
			axe[z].position.x=ango/6.6;
			axe[z].scale.setScalar(diam/3+0.3);
			spring.add(axe[z]);
		}
		spring.position.x=-13;;
		scene.add(spring);
		sim=1;
	}
	controls.update();
	renderer.render(scene,camera);
}

function onWindowResize(){
	camera.aspect=window.innerWidth/window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize(window.innerWidth,window.innerHeight);
}

init();
animate();

</script>
</body>
</html>
