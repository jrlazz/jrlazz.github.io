/*
When MayMoveMouse=1 the mouse can be moved.
When it is moved finder() is called and raycaster looks for
 seven balls or six cushions.
At this moment You can press Space Key.
When You press Space Key, MayPressSpace goes from one to zero to prevent many spaces

 if MayMoveMouse==1 pode-se mover o mouse
*/

function onMouseMove(event){
	if(MayMoveMouse==1){
		finder();
		pos();
		event.preventDefault();
		mouse.x=(event.clientX/window.innerWidth)*2-1;
		ang=mouse.x*p*360/(window.innerWidth-10/2);
		//dspang.innerText="deg: "+(180*ang).toFixed(3)+" rad: "+(degrad*180*ang).toFixed(3);
		radang=degrad*180*ang;
	}
	scene.remove(arrowHelper);
	CushionTouchPoint.position.set(-1000,0,0);
	CushionTargetPoint.position.set(-1000,0,0);
	scene.add(CushionTouchPoint);scene.add(CushionTargetPoint);
	dush.innerText="?";
	dush.innerText=radang.toFixed(8);
}

function onMouseDown(event){
	if(event.button===1){// Middle Mouse Button changes white ball position
		mouse.x=(event.clientX/window.innerWidth)*2-1;
		mouse.y=-(event.clientY/window.innerHeight)*2+1;
		//console.log("Right click detected!", mouse.x, mouse.y);
		dix.value=parseInt(mouse.x*window.innerWidth/5);valx=parseInt(dix.value);pos();
		diy.value=parseInt(mouse.y*100);valy=parseInt(diy.value);pos();
	}
}

function pos(){
	s[0].position.set(valx,valy,0);
	gru.position.set(valx,valy,0);
	for(let z=1;z<8;z++){if(s[z] && v[z] && plaft[z]==1){s[z].position.copy(v[z]);}}
}

/*
Obs:
inter(j) entra somente quando MayPressSpace=1 e envia para "balls ini" ou  "cushions ini"
a tecla space funciona com MayPressSpace=1, passa para MayPressSpace-0 e depois de if(found){inter(found); passa MayPressSpace=1
found vem de finder() que foi ativada em mouse move
inter()vem de tecla space se existe um found
*/

function inter(j){
	if(cushioned==0){MayMoveMouse=0;pos();}
	const origin=s[0].position.clone();
	if(cushioned==0){
		direction=new THREE.Vector3(Math.cos(radang+p/2),Math.sin(radang+p/2),0).normalize();
		raycaster.set(origin,direction);
		intersects=raycaster.intersectObjects(treze,false);
	}else{
		direction=cushdirection;
		raycaster.set(origin,direction);
		intersects=raycaster.intersectObjects(sete,false);
	}
	if(intersects.length>0){
		touch.position.set(intersects[0].point.x,intersects[0].point.y,0);
		const radius=6;
		const hit=intersects[0].point.clone();
		const center=s[j].position.clone();
		const normal=hit.clone().sub(center).normalize();
		const dot=direction.dot(normal);
		const objectDir=normal.clone();
		const whiteDir=direction.clone().sub(normal.clone().multiplyScalar(dot)).normalize();
		objAngle=Math.atan2(objectDir.y,objectDir.x);
		whiteAngle=Math.atan2(whiteDir.y,whiteDir.x);
		s[0].position.copy(hit.clone().add(normal.clone().multiplyScalar(radius)));
		cushorigin=s[0].position.clone();
		angle=Math.atan2(normal.y,normal.x);
		k[j]=1;
		MayPressSpace=0;
		dpode.innerText="Wait";
	}else{
		//console.log("... no");
	}
}

function finder(){
	if(MayPressSpace==1){
		pos();const origin=s[0].position.clone();
		const direction=new THREE.Vector3(Math.cos(radang+p/2),Math.sin(radang+p/2),0).normalize();
		raycaster.set(origin,direction);
		intersects=raycaster.intersectObjects(treze,false);
		if(intersects.length>0){
			found=Number(intersects[0].object.name);
			if(found>0 && found<8){dfind.innerText="Ball "+found;}
			if(found>10 && found<17){dfind.innerText="Cushion "+found;}
		}else{
			found="";dfind.innerText=found;//console.log("... no found ...");
		}
	}
}

function intercushion(){
	cushdirection=new THREE.Vector3();
	cushdirection.subVectors(CushionTargetPoint.position,CushionTouchPoint.position).normalize();
	scene.remove(arrowHelper);
	arrowHelper=new THREE.ArrowHelper(cushdirection.normalize(),cushorigin,200,'#777');
	scene.add(arrowHelper);
	found=0;
	zraycaster.set(cushorigin,cushdirection);
	cushintersects=zraycaster.intersectObjects(sete,false);
	if(cushintersects.length>0){
		found=Number(cushintersects[0].object.name);
		//alert(found);
		s[0].position.copy(CushionTouchPoint.position);
		dush.innerText="cush "+found;
		//alert("s[0]")
		cushioned=1;
		inter(found);
	}
}

function triggerAction(event){
	//alert(event.code);
	switch (event.code) {
		case 'ArrowRight':arrows();radang=radang-p/2000;break;
		case 'ArrowLeft':arrows();radang=radang+p/2000;break;
		case 'Space':
			if(MayPressSpace==1){
				MayPressSpace=0;
				dpode.innerText="Do";
				cue.position.set(0,-6.2,0);
				bout=setTimeout(function(){cue.position.set(0,-20,0);pos();for(let z=1;z<21;z++){q[z]=0};if(found){inter(found);}clearTimeout(bout);},400);
			}
	//cout=setTimeout(function(){MayPressSpace=1;clearTimeout(cout);},100);
			break;
		case 'ArrowUp':arrows();radang=radang+p/2000;break;
		case 'ArrowDown':arrows();radang=radang-p/2000;break;
	}
}
	
function arrows(){
	finder();
	scene.remove(arrowHelper);
	CushionTouchPoint.position.set(-1000,0,0);CushionTargetPoint.position.set(-1000,0,0);
	scene.add(CushionTouchPoint);scene.add(CushionTargetPoint);
	dush.innerText="?";
	dush.innerText=radang.toFixed(8);
}

function animate(t){
	requestAnimationFrame(animate);
	timer.update(t);
	const delta=Math.min(timer.getDelta(),0.05);
	const deltaw=delta * 120;const qtot=70*2;

	gru.rotation.z=radang;

	if(control==1){
		controls.enabled=true;
		/*
		const posText=bId('cam-pos');
		const rotText=bId('cam-rot');
		const pX=camera.position.x.toFixed(1);const pY=camera.position.y.toFixed(1);const pZ=camera.position.z.toFixed(1);
		const rX=camera.rotation.x.toFixed(1);const rY=camera.rotation.y.toFixed(1);const rZ=camera.rotation.z.toFixed(1);
		posText.innerText=`CamPos X: ${pX},Y: ${pY},Z: ${pZ}`;rotText.innerText=`CamRot X: ${rX},Y: ${rY},Z: ${rZ}`;
		*/
	}else{
		controls.enabled=false;camera.position.set(pcam[1],pcam[2],pcam[3]);camera.rotation.set(rcam[1],rcam[2],rcam[3]);
	}

	// ******** for balls ini
	for(let z=1;z<8;z++){if(k[z]==1){ballpos(z);}}
	function ballpos(j){
		s[j].position.x -=(deltaw*Math.cos(angle));s[j].position.y -=(deltaw*Math.sin(angle));
		s[0].position.x +=(deltaw*Math.cos(whiteAngle));s[0].position.y +=(deltaw*Math.sin(whiteAngle));
		// pockets
		for(let z=21;z<27;z++){
			const distance=s[j].position.distanceTo(s[z].position);
			const proximityThreshold=6.0; 
			if(distance<proximityThreshold){plaft[j]=0;q[j]=qtot-1;dfind.innerText="Plaft!!!";}
		}
		if(outOf(s[j])){scene.remove(s[j]);fwow();}
		if(outOf(s[0])){scene.remove(s[0]);fwow();}
		q[j]++;if(q[j]==qtot){k[j]=0;}
		if(k[j]==0){
			aout=setTimeout(function(){q[j]=0;pos();MayMoveMouse=1;MayPressSpace=1;dpode.innerText="Do";scene.add(s[j]);scene.add(s[0]);cushioned=0;clearTimeout(aout);},200);
		}
		if(plaft[j]==0){s[j].position.set(-135,-60+(15*j),12);s[j].scale.setScalar(0.4);}
	}
	// ******** for balls end

	// ******** for cushions ini
	for(let z=11;z<17;z++){
		fator=3;
		if(k[z]==1){
			if(z==11 || z==14){s[0].position.y +=(fator*deltaw*Math.cos(radang));s[0].position.x +=(fator*deltaw*Math.sin(radang));}
			if(z==12 || z==13 || z==15 || z==16){s[0].position.y -=(fator*deltaw*Math.cos(radang));s[0].position.x -=(fator*deltaw*Math.sin(radang));}
			if(outOf(s[0])){scene.remove(s[0]);fwow();arrows();}
			if(q[z]==1){CushionTouchPoint.position.copy(s[0].position);}
			if(q[z]==20){CushionTargetPoint.position.copy(s[0].position);intercushion();}
			q[z]++;if(q[z]==21){k[z]=0;}
			//if(k[z]==0){aout=setTimeout(function(){q[z]=0;pos();scene.add(s[0]);MayMoveMouse=1;MayPressSpace=1;dpode.innerText="Do";clearTimeout(aout);},200);}
			if(k[z]==0){aout=setTimeout(function(){q[z]=0;pos();MayMoveMouse=1;MayPressSpace=1;dpode.innerText="Do";scene.add(s[0]);clearTimeout(aout);},200);}
		}
	}
	// ******** for cushions end

	function outOf(obj){return(obj.position.x>157 || obj.position.x<-157 || obj.position.y>80 || obj.position.y<-80);}

	function fwow(){dfind.innerText="out";}

	renderer.render(scene,camera);
}

init();
animate();

function onWindowResize(){
	camera.aspect=window.innerWidth/window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize(window.innerWidth,window.innerHeight);
}

</script>

<script>
function toggleFullScreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
}
</script>
