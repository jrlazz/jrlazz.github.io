function cyli(r1,r2,r3,r4,cor){g=new THREE.CylinderGeometry(r1,r2,r3,r4);;m=new THREE.MeshStandardMaterial({color:cor});}
function matc(a,b,c,cor){g=new THREE.BoxGeometry(a,b,c);m=new THREE.MeshStandardMaterial({color:cor});}

function animate(t){
	requestAnimationFrame(animate);
	const delta=clock.getDelta();
	www++;
	if(www<100){point[1].intensity=www*100;point[3].intensity=www*150;}
	if(www>100){www=1000;}

	if(ww>359){ww=0;}

	if(gbraco && sim==0){desliga();sim=1;}

	if(bM && bM2 && tela && xi[1] && axe[1] && axe[2] && w==0){apply();w=1;}

	if(axe[1].rotation.z>-p/2){
		axe[1].rotation.z -=angu*2;
		axe[2].rotation.z -=angu*2;
	}

	if(sprite1){sprite1.material.rotation=-0.05*ww;}

	if(tex[3] && sim==1){scene.add(tex[3]);sim=2;}

	if(sim==2 && gbraco){gbraco.rotation.x=-0.2;gbraco.rotation.y=-0.04;sim=3;}
	if(sim==3 && ligado==1){gbraco.rotation.x=0;gbraco.rotation.y=-0.04;sim=4;}

	if(ligado==1){ww++;gbraco.rotation.y -=delta/1000;r.rotation.y -=delta;}

	if(ligado==1 && !sprite1.parent){
		scene.add(sprite1);
		scene.add(sprite2);
	}

	if(tex[4] && ligado==0){
		scene.add(tex[4]);
		tex[4].rotation.y +=dife;
		if(tex[4].rotation.y>0.5){dife=-dife;}
		if(tex[4].rotation.y<-0.5){dife=-dife;}
	}

	if(tex[4] && ligado==1){scene.remove(tex[4]);tex[4].rotation.y=0;}

	function isAudioPlaying(audio){return(audio.currentTime>0 && !audio.paused && !audio.ended && audio.readyState>2);}
	let eT=audio.currentTime;
	if(eT>186.6){gbraco.rotation.x=-0.2;gbraco.rotation.y=-0.04;}
	if(eT>187.8){
		audio.currentTime=0;
		lastLyric=-1;
		gbraco.rotation.x=0;
		gbraco.rotation.y=-0.04;
		ww=0;
	}

	if(eT>15 && eT<15.5){scene.remove(tex[3]);remo();}

	//dsp.innerText=eT;

	for(let k=0;k<lyricsTimeline.length;k++){
  		if(eT >= lyricsTimeline[k].t && lastLyric !== k){
			if(lyricsTimeline[k].first){
				//scene.remove(tex[3]);
			}else{
				//scene.remove(tex[3]);
				remo();
			}
			scene.add(tex[lyricsTimeline[k].i]);
			lastLyric=k;
  		}
	}

	function remo(){
		for(let z=10;z<23;z++){scene.remove(tex[z]);}
	}

	function apply(){
		m=CSG;g=bM.geometry;
		let bCSG=CSG.fromMesh(bM,0);
		let bCSG2=CSG.fromMesh(bM2,0);
		bCSG=bCSG.subtract(bCSG2);
		rM=CSG.toMesh(bCSG,bM.matrix,[bM.material,bM2.material]);
		rM.geometry.computeVertexNormals();
		rM.updateMatrix();rM.updateMatrixWorld();
		scene.remove(bM);scene.remove(bM2);
		rM.add(tela);
		rM.position.set(-10.5,12.8,0);
		axe[1].add(rM.clone());
		scene.add(axe[1]);
			axe[2].add(rM.clone());
			axe[2].rotation.y=-p;
			scene.add(axe[2]);
	}
	controls.update();
	renderer.render(scene,camera);
}

function onClick(event){
	document.body.style.cursor='default';
	mouse.x=event.clientX/window.innerWidth*2-1;
	mouse.y=-(event.clientY/window.innerHeight)*2+1;
	ray();
}

function ray(){
	diP.style.display="none";
	raycaster.setFromCamera(mouse,camera);
	intersects=raycaster.intersectObjects(scene.children,true);
	if (intersects.length>0){
		selected=intersects[0].object;
		if(!selected.name || selected.name[0] !== "v"){
			if(ligado==0){liga();ligado=1;audio.play();return}
			if(ligado==1){desliga();ligado=0;audio.pause();for(let z=10;z<21;z++){scene.remove(tex[z]);};}
		}else{
			v[0].material.color.set('#900');
			for(let z=1;z<11;z++){v[z].material.color.set('#090');}
			const q=Number(selected.name.substring(1));
			audio.volume=selected.name.substring(1)/10;
			dsp.innerText="Vol "+Number(audio.volume).toFixed(1);
			v[q].material.color.set('#0f0');
			if(q==0){v[q].material.color.set('#f00');}
		}
	}
}

function onTouchStart(event){
	const touch=event.touches[0];
	startX=touch.clientX;
	startY=touch.clientY;
	touchStartTime=Date.now();
}

function onTouchEnd(event){
	const touch=event.changedTouches[0];
	const dx=Math.abs(touch.clientX-startX);
	const dy=Math.abs(touch.clientY-startY);
	const dt=Date.now()-touchStartTime;
	// only real tap
	if(dx < 10 && dy < 10 && dt < 200){
		mouse.x=touch.clientX / window.innerWidth * 2 - 1;
		mouse.y=-(touch.clientY / window.innerHeight) * 2 + 1;
		scene.position.set(0,0,0);
		ray();
	}
}

function myTifun(){
	scene.position.set(0,0,0);
	myTiclear();
}

function myTiclear(){
	clearTimeout(myTi);
}

function liga(){
	ax.rotation.z=-0.2;
	if(audio.paused){audio.play().catch(()=>{});}
}

function desliga(){ax.rotation.z =0.2;}

	camera.aspect=innerWidth/innerHeight;

});
