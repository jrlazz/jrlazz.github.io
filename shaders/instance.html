<!DOCTYPE html>
<html lang="en">
<head>
<title>instance.html</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<link rel="icon" type="image/png" href="../img/github-mark.png">
<meta name="description" content="... Playing with THREE.InstancedMesh ...">
<meta name="twitter:image" content="img/ag_baboy_right.png" />
<meta name="twitter:image:type" content="png" />
<meta name="twitter:image:width" content="19" />
<meta name="twitter:image:height" content="47" />

<style>
body{overflow:hidden;margin:0;background:#026;font-family:Monospace;}
span{position:absolute;left:10px;top:10px;color:#ff0;font-size:10.25pt;z-index:1;cursor:pointer;}
textarea{position:absolute;color:#009;padding:6px;left:800px;top:10px;width:180px;height:300px;cursor:pointer;}
</style>

<script type="importmap">
{
	"imports":{
		"three":"https://unpkg.com/three@0.184.0/build/three.module.js",
		"three/addons/":"https://unpkg.com/three@0.184.0/examples/jsm/"
	}
}
</script>
</head>

<body id="bo">
<span id="sp">instance.html - click and view textarea</span>
<textarea id="ta" autocomplete="off" style=display:none;"></textarea>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js'

let renderer,scene,camera,controls;
let tot=new THREE.Group();
let mat=[],geo=[];
let p=Math.PI;
let g,m,s,la,lb,lc;
let dummy;
let tex,ta;
let step;
let texto="Click to close\n";
let t=0;
let tt=0;
let j=0;
let pulo=1.5;

let newX=0;
let newY=25;
let newZ=0;
let index=12;
let row;
let rows=[];

const matrix=new THREE.Matrix4();

let array=[];

let dta=document.getElementById("ta");
let dsp=document.getElementById("sp");

function init(){

	dta.onclick=function DTA(){dta.style.display="none";}
	dsp.onclick=function DSP(){dta.style.display="";}

	renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
	renderer.setSize(window.innerWidth,window.innerHeight);
	renderer.setPixelRatio(window.devicePixelRatio);
	renderer.setClearColor(0x006699,0);
	renderer.outputColorSpace=THREE.SRGBColorSpace;
	document.body.appendChild(renderer.domElement);

	scene=new THREE.Scene();

	camera=new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,2000);
	camera.position.set(0,0,40);
	scene.rotation.x=-p/4;

	controls=new OrbitControls(camera,renderer.domElement);
	controls.enableDamping=true;

	window.addEventListener("resize",onWindowResize);

	tex=new THREE.TextureLoader().load("img/music.png");
	tex.rotation=p/2; 
	tex.wrapS=THREE.RepeatWrapping;tex.wrapT=THREE.RepeatWrapping;
	tex.repeat.set(1,2);

	mat[1]=new THREE.MeshStandardMaterial({color:"#999",map:tex,transparent:false});

	scene.add(new THREE.AmbientLight(0xffffff,2));
	g=new THREE.SphereGeometry(1,7,7);
	s=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:"#fff",wireframe:true}));
	la=new THREE.PointLight(0xffffff,50000);
	la.position.set(0,0,50);
	la.add(s);
	scene.add(la);

	geo[1]=new THREE.BoxGeometry(0.9,0.05,2.9);
	geo[2]=new THREE.CylinderGeometry(0.02,0.2,4);
	geo[2].translate(0,2,0);
	geo[3]=new THREE.SphereGeometry(0.4);
	geo[3].translate(0,3,0);
	g=BufferGeometryUtils.mergeGeometries([geo[1],geo[2],geo[3]]);

	step=104;
	s=new THREE.InstancedMesh(g,mat[1],step);
	dummy=new THREE.Object3D();
	let color=new THREE.Color();
	for(let i=0;i<step;i++){
		pulo=1.5-pulo;
		dummy.position.set(i,0,pulo);
		dummy.updateMatrix();
		s.setMatrixAt(i,dummy.matrix);
		s.setColorAt(i,color);
	}
	s.instanceMatrix.needsUpdate=true;
	s.instanceColor.needsUpdate=true;

	for(let z=1;z<15;z++){
		row=s.clone();
		for(let i=0;i<step;i++){
			color.setHSL((Math.random()*360)/360,1,0.5);row.setColorAt(i,color);
			if(i==5){j++;texto=texto + 'array['+j + ']="#' +color.getHexString() + '";\n';}
		}
		row.instanceColor.needsUpdate=true;
		row.position.z=z*3;
			updateInstancePosition(row,30,50,5,0); // all rows!!!
		rows.push(row);
		tot.add(row);
	}
	tot.rotation.set(p/2,0,0);
	tot.position.set(-50,30,0);
	scene.add(tot);

	dta.value=texto;

	function updateInstancePosition(mesh,index,newX,newY,newZ){
		mesh.getMatrixAt(index,matrix);
		const pos=new THREE.Vector3();
		const quat=new THREE.Quaternion();
		const scale=new THREE.Vector3();
		matrix.decompose(pos,quat,scale);
		pos.set(newX,newY,newZ);
		matrix.compose(pos,quat,scale);
		mesh.setMatrixAt(index,matrix);
		mesh.instanceMatrix.needsUpdate=true;
	}

}

function animate(){
	requestAnimationFrame(animate);
	t++;
	tt++
	if(t== 50){updateInstancePosition(rows[1],21,21,5,1.5);}
	if(t== 100){updateInstancePosition(rows[1],21,21,0,1.5);}
	if(t==100){t=0;}

	updateInstancePosition(rows[5],0,Math.sin(tt*0.05)*0,0+Math.cos(tt*0.05)*10,0);
	if(tt>359){tt=0;}

	function updateInstancePosition(mesh,index,newX,newY,newZ){
		mesh.getMatrixAt(index,matrix);
		const pos=new THREE.Vector3();
		const quat=new THREE.Quaternion();
		const scale=new THREE.Vector3();
		matrix.decompose(pos,quat,scale);
		pos.set(newX,newY,newZ);
		matrix.compose(pos,quat,scale);
		mesh.setMatrixAt(index,matrix);
		mesh.instanceMatrix.needsUpdate=true;
	}

	controls.update();
	renderer.render(scene,camera);
}

function onWindowResize(){
	camera.aspect=window.innerWidth/window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize(window.innerWidth,window.innerHeight);
}

init();
animate();

/*
Coloring and positioning each mesh with THREE.InstancedMesh
*/

</script>
</body>
</html>
