	import * as THREE from 'three';

	import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
	import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';

const params={
	metalness: 1.0,
	roughness: 0.0,
	exposure: 1.7,
};

var scene,camera,renderer,controls,loader,gui;
var amb,g,m,s,texture;
var p=Math.PI;
var gr=[];for(let z=1;z<10;z++){gr[z]=new THREE.Group();}

	renderer.setSize(window.innerWidth,window.innerHeight);
	renderer.setClearColor('#000',1);
	renderer.setPixelRatio(window.devicePixelRatio);
	renderer.toneMapping=THREE.ACESFilmicToneMapping;
	renderer.toneMappingExposure=params.exposure;
	document.body.appendChild(renderer.domElement);

	scene=new THREE.Scene();

	amb=new THREE.AmbientLight('#fff',10);scene.add(amb);

	loader.setPath('images/pisa/');

	loader=new SVGLoader();
	loader.load('img/aladdin_1.svg',function(data){

		for(let i=0;i<paths.length;i++){

			shapes=SVGLoader.createShapes(path);
			for(let j=0;j< shapes.length;j++){
				shape=shapes[j];
				let gg=new THREE.ExtrudeGeometry(shape,extrudeSettings);
				if(j==0){
					slice=new THREE.Mesh(gg,new THREE.MeshStandardMaterial({roughness:params.roughness,metalness: params.metalness }));
					slice.scale.setScalar(0.4);
					slice.position.set(0,20,0);
				}
			}
		}
		for(let z=0;z<361;z++){
			s=slice.clone();
			s.rotation.set(p,z/45,0);
			scene.add(s);
		}
	});

	for(let z=1;z<22;z++){

		gr[7].add(s);
	}

	for(let z=1;z<22;z++){

		s.rotation.z=0.1;
		s.scale.setScalar(0.9);
		s.position.set(0,-41,0);
		gr[7].add(s);
	}

	gr[7].scale.setScalar(0.12);
	gr[7].position.set(0,26.5,0);
	scene.add(gr[7]);

// **************** rings
	g=new THREE.SphereGeometry(5,64,64,0,2*p,0.95,1.1);
	s=new THREE.Mesh(g,new THREE.MeshStandardMaterial({roughness:params.roughness,metalness:params.metalness}));
	s.scale.set(1,0.4,1);
	s.position.set(0,19.5,0);
	scene.add(s);
		s=s.clone();
		s.scale.set(1.05,0.25,1.05);
		s.position.set(0,26.8,0);
		scene.add(s);
	s=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:'#000',side:THREE.DoubleSide}));
	s.scale.set(0.8,0.08,0.8);
	s.position.set(0,26.5,0);
	scene.add(s);

// **************** camisa
	g=new THREE.TorusGeometry(6,1,64,64);

		s=gr[8].clone();

	for(let z=1;z<22;z++){
		s=gr[8].clone();

		s.rotation.z=0.5;

		gr[9].add(s);
	}

	for(let z=1;z<22;z++){
		s=gr[8].clone();
		s.rotation.y=z/3.35;
		s.scale.setScalar(1.4);
		s.rotation.z=0.5;
		s.position.set(0,42,0);

	}

	for(let z=1;z<22;z++){
		s=gr[8].clone();
		s.rotation.y=z/3.35;
		s.scale.setScalar(1.8);
		s.rotation.z=0.5;
		s.position.set(0,80,0);
		gr[9].add(s);
	}

	s=new THREE.Mesh(new THREE.CylinderGeometry(2,2,140),new THREE.MeshStandardMaterial({color:'#000'}));
	s.rotation.x=p/2;
	s.scale.set(1,0.45,1)
	s.position.set(0,-15,0);
	gr[9].add(s);
		s=s.clone();
		s.rotation.z=p/2;
		s.scale.set(1,1,1)
		gr[9].add(s);
			s=s.clone();
			s.rotation.y=p/2;
			s.scale.set(1,0.6,1)
			s.position.set(-70,28,0);
			gr[9].add(s);
				s=s.clone();
				s.position.set(70,28,0);
				gr[9].add(s);

	gr[9].scale.set(0.05,0.07,0.05);
	gr[9].rotation.x=p;
	gr[9].position.set(0,31,0);
	//scene.add(gr[9]);

// **************** bulbo
	g=new THREE.LatheGeometry(new THREE.Path().moveTo(0.5,-1.5).bezierCurveTo(0.75,-1,0.75,-1,0.5,1.5).getSpacedPoints(20),32);
	m=new THREE.MeshPhysicalMaterial({
		transmission:1,
		ior:1.3,
		thickness:0.25,
		metalness:0.3,
		roughness:0.1,
		attenuationColor:"#fff",
		attenuationDistance:0.5
	});
	s=new THREE.Mesh(g,m);
	s.scale.set(8.3,20,8.3);
	s.position.set(0,55,0);
	scene.add(s)

// **************** gui
	gui=new GUI();
	gui.add(params,'exposure',0,2,0.01);
	gui.open();

window.addEventListener('resize',onWindowResize);}

function onWindowResize(){
	camera.aspect=window.innerWidth/window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize(window.innerWidth,window.innerHeight);
}

function animate(){
	requestAnimationFrame(animate);
	clock.update();
	const delta=clock.getDelta();
/*
	t=t+delta;
	if(t && sim==0){
		dsp1.innerText="Aladdin Lamp is beeing created... "+(t*10).toFixed(1)+" %";
		dsp2.innerText=dsp1.innerText;
	}
*/
	if (texture.image.length === 6 && sim==0) {
		console.log('Cubemap is already loaded');
		texture.needsUpdate=true;
		scene.background=texture;
		scene.environment=texture;
		renderer.setClearColor('#440',1);
		dsp1.innerText="Aladdin is ready...";
		dsp2.innerText="Aladdin is ready...";
		dsp2.style.color="#006";
		scene.add(gr[9]);
		sim=1;
	}
	renderer.toneMappingExposure=params.exposure;
	controls.update();
	renderer.render(scene,camera);
}

init();
animate();
