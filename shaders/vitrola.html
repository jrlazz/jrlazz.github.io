function animate(t){

	const delta=clock.getDelta();

//ga.rotation.x -=-0.05;
//xa.rotation.x -=-0.05;
pedra.rotation.y -=delta;
		xa.rotation.x +=angu;

//gt.rotation.x -=-0.05;

		desliga();
		sim=1;
	}

		cha[1].add(tex[1]);
		cha[2].add(tex[2]);
		scene.add(tex[3]);
		sim=2;
	}

	if(sim==2){scene.add(onoff);sim=3;}
	if(sim==3 && ligado==1){gbraco.rotation.x=0;gbraco.rotation.y=-0.04;sim=4;}

	if(ligado==1){gbraco.rotation.y -=delta/1000;r.rotation.y -=delta;}

	if(tex[4] && ligado==0){
		scene.add(tex[4]);
		tex[4].rotation.y +=dife;
		if(tex[4].rotation.y>0.3){dife=-dife;}
		if(tex[4].rotation.y<-0.3){dife=-dife;}
	}

	if(tex[4] && ligado==1){scene.remove(tex[4]);tex[4].rotation.y=0;}

	function isAudioPlaying(audio){return(audio.currentTime>0 && !audio.paused && !audio.ended && audio.readyState>2);}
	let elapsedTime=audio.currentTime;
	if(elapsedTime>186.6){gbraco.rotation.x=-0.2;gbraco.rotation.y=-0.04;}
	if(elapsedTime>187.8){audio.currentTime=0;gbraco.rotation.x=0;gbraco.rotation.y=-0.04;}
	controls.update();
	renderer.render(scene,camera);
}

function onClick(event){
	raycaster.setFromCamera(mouse,camera);
	intersects=raycaster.intersectObjects(alvos,false);
	if (intersects.length>0){
		selected=intersects[0].object;
		if(selected.name=="cha1" || selected.name=="cha11"){desliga();ligado=0;au.pause();}
		if(selected.name=="cha2" || selected.name=="cha22"){liga();ligado=1;au.play();}
	}
}

function onMove(event){
	document.body.style.cursor='default';
	mouse.x=event.clientX/window.innerWidth*2-1;
	mouse.y=-(event.clientY/window.innerHeight)*2+1;
	raycaster.setFromCamera(mouse,camera);
	intersects=raycaster.intersectObjects(alvos,false);
	if (intersects.length>0){document.body.style.cursor='pointer';}
}

function liga(){ax.rotation.z =-0.2;}

function desliga(){ax.rotation.z =0.2;}

window.addEventListener("resize",() => {

<script>
function toggleFullScreen(){
	if(!document.fullscreenElement){
		if(document.documentElement.requestFullscreen){
      			document.documentElement.requestFullscreen();
    		}else if(document.documentElement.mozRequestFullScreen){ // Firefox
      			document.documentElement.mozRequestFullScreen();
    		}else if(document.documentElement.webkitRequestFullscreen){ // Chrome,Safari & Opera
      			document.documentElement.webkitRequestFullscreen();
    		}else if(document.documentElement.msRequestFullscreen){ // IE/Edge
      			document.documentElement.msRequestFullscreen();
    		}
	}else{
		if(document.exitFullscreen){
			document.exitFullscreen();
		}else if(document.mozCancelFullScreen){ // Firefox
			document.mozCancelFullScreen();
		}else if(document.webkitExitFullscreen){ // Chrome,Safari & Opera
			document.webkitExitFullscreen();
		}else if(document.msExitFullscreen){ // IE/Edge
			document.msExitFullscreen();
		}
	}
