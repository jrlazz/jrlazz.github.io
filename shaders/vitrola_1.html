function animate(t){
	requestAnimationFrame(animate);
	const delta=clock.getDelta();

	//ga.rotation.x -=-0.05;
	//xa.rotation.x -=-0.05;

	pedra.rotation.y -=delta;
	xa.rotation.x +=angu;

	if(xa.rotation.x<-0){angu=-angu;}

	if(sim==0){desliga();sim=1;}
	if(tex[3] && sim==1){scene.add(tex[3]);sim=2;}

	if(sim==2){scene.add(onoff);sim=3;}
	if(sim==3 && ligado==1){gbraco.rotation.x=0;gbraco.rotation.y=-0.04;sim=4;}

	if(ligado==1){gbraco.rotation.y -=delta/1000;r.rotation.y -=delta;}

	if(tex[4] && ligado==0){
		scene.add(tex[4]);
		tex[4].rotation.y +=dife;
		if(tex[4].rotation.y>0.3){dife=-dife;}
		if(tex[4].rotation.y<-0.3){dife=-dife;}
	}

	if(tex[4] && ligado==1){scene.remove(tex[4]);tex[4].rotation.y=0;}

	function isAudioPlaying(audio){return(audio.currentTime>0 && !audio.paused && !audio.ended && audio.readyState>2);}
	let eT=audio.currentTime;
	if(eT>186.6){gbraco.rotation.x=-0.2;gbraco.rotation.y=-0.04;}
	if(eT>187.8){
		audio.currentTime=0;gbraco.rotation.x=0;gbraco.rotation.y=-0.04;
		scene.remove(tex[21]);scene.add(tex[3]);
	}

	dsp.innerText=eT.toFixed(3);

	if(eT>20.5 && eT<21){scene.remove(tex[3]);scene.add(tex[10]);}
	if(eT>34.5 && eT<35){scene.remove(tex[10]);scene.add(tex[11]);}
	if(eT>50.3 && eT<51){scene.remove(tex[11]);scene.add(tex[12]);}
	if(eT>61.2 && eT<62){scene.remove(tex[12]);scene.add(tex[13]);}

	if(eT>73.2 && eT<74){scene.remove(tex[13]);scene.add(tex[14]);}
	if(eT>81.3 && eT<82){scene.remove(tex[14]);scene.add(tex[15]);}
	if(eT>91.2 && eT<92){scene.remove(tex[15]);scene.add(tex[16]);}
	if(eT>104.9 && eT<106){scene.remove(tex[16]);scene.add(tex[17]);}
	if(eT>116.4 && eT<117){scene.remove(tex[17]);scene.add(tex[18]);}

	if(eT>154.2 && eT<155){scene.remove(tex[18]);scene.add(tex[19]);}
	if(eT>165.5 && eT<166){scene.remove(tex[19]);scene.add(tex[20]);}
	if(eT>170.5 && eT<171){scene.remove(tex[20]);scene.add(tex[21]);}

	controls.update();
	renderer.render(scene,camera);
}

function onClick(event){
	raycaster.setFromCamera(mouse,camera);
	intersects=raycaster.intersectObjects(alvos,false);
	if (intersects.length>0){
		selected=intersects[0].object;
		if(selected.name=="AudioScreen"){
			if(ligado==0){liga();ligado=1;audio.play();return}
			if(ligado==1){desliga();ligado=0;audio.pause();}
		}
	}
}

function onMove(event){
	document.body.style.cursor='default';
	mouse.x=event.clientX/window.innerWidth*2-1;
	mouse.y=-(event.clientY/window.innerHeight)*2+1;
	raycaster.setFromCamera(mouse,camera);
	intersects=raycaster.intersectObjects(alvos,false);
	if (intersects.length>0){document.body.style.cursor='pointer';}
}


function onTouchStart(event){
	event.preventDefault();
	const touch=event.touches[0];
	mouse.x=touch.clientX/window.innerWidth * 2 - 1;
	mouse.y=-(touch.clientY/window.innerHeight) * 2 + 1;
	raycaster.setFromCamera(mouse,camera);
	intersects=raycaster.intersectObjects(alvos,false);
	if(intersects.length>0){
		selected=intersects[0].object;
		if(selected.name=="AudioScreen"){
			if(ligado==0){liga();ligado=1;audio.play();return}
			if(ligado==1){desliga();ligado=0;audio.pause();}
		}
	}
}

function onTouchMove(event){
	const touch=event.touches[0];
	mouse.x=touch.clientX/window.innerWidth * 2 - 1;
	mouse.y=-(touch.clientY/window.innerHeight) * 2 + 1;
}

function liga(){ax.rotation.z =-0.2;}

function desliga(){ax.rotation.z =0.2;}

<script>
function toggleFullScreen(){

		if(document.documentElement.requestFullscreen){
      			document.documentElement.requestFullscreen();
    		}else if(document.documentElement.mozRequestFullScreen){ // Firefox
      			document.documentElement.mozRequestFullScreen();
    		}else if(document.documentElement.webkitRequestFullscreen){ // Chrome,Safari & Opera
      			document.documentElement.webkitRequestFullscreen();
    		}else if(document.documentElement.msRequestFullscreen){ // IE/Edge
      			document.documentElement.msRequestFullscreen();
    		}
	}else{
		if(document.exitFullscreen){
			document.exitFullscreen();
		}else if(document.mozCancelFullScreen){ // Firefox
			document.mozCancelFullScreen();
		}else if(document.webkitExitFullscreen){ // Chrome,Safari & Opera
			document.webkitExitFullscreen();
		}else if(document.msExitFullscreen){ // IE/Edge
			document.msExitFullscreen();
		}
	}
}
</script>
