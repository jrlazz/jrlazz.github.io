<!DOCTYPE html>
<html lang="en">
<head>
<title>number_on_sphere4.html</title>
<meta charset="utf-8">
<link rel="icon" type="image/png" href="../img/github-mark.png">

<style>
body{overflow:hidden;margin:0;background:#048;font-family:Arial;}
</style>

<script type="importmap">
{
	"imports":{
		"three":"https://unpkg.com/three@0.184.0/build/three.module.min.js",
		"three/addons/":"https://unpkg.com/three@0.184.0/examples/jsm/"
	}
}
</script>
</head>

<body>

<script id="vertex_shader" type="x-shader/x-vertex">
	varying vec3 vNormal;
	varying vec3 vPosition;
	varying vec2 vUv;
	void main(){
		vUv = uv;
		vNormal =normalize(normalMatrix * normal);
		vec4 mvPosition =modelViewMatrix * vec4(position,1.0);
		vPosition = mvPosition.xyz;
		gl_Position =projectionMatrix * mvPosition;
	}
</script>

<script id="fragment_shader" type="x-shader/x-fragment">
uniform vec3 ambientLightColor;
uniform sampler2D tex;
uniform float metalness;
uniform float roughness;
varying vec3 vNormal;
varying vec3 vPosition;
varying vec2 vUv;
struct PointLight{
	vec3 position;
	vec3 color;
	float distance;
	float decay;
};
uniform PointLight pointLights[NUM_POINT_LIGHTS];
void main(){
	vec2 uv = (vec2(
		(vUv.x - 0.5) * 5.0,
		(vUv.y - 0.5) * 2.5
	)) + 0.5;
	vec3 color = texture2D(tex,uv).rgb;
	vec3 normal = normalize(vNormal);
	vec3 viewDir = normalize(-vPosition);
	// Fresnel
	float fresnel =
		pow(
			1.0 - max(dot(viewDir,normal),0.0),
			3.0
		);
	// Fake environment reflection
	vec3 envColor =
		vec3(0.1,0.4,0.8) *
		(1.0 - normal.y * 0.5);
	vec3 finalColor =
		color * ambientLightColor;
	for(int i=0;i<NUM_POINT_LIGHTS;i++){
		vec3 lightVector =
			pointLights[i].position - vPosition;
		float distance =
			length(lightVector);
		vec3 lightDir =
			normalize(lightVector);
		float diff =
			max(dot(normal,lightDir),0.0);
		float attenuation =
			1.0 / (1.0 + distance * 0.02);
		// Diffuse
		vec3 diffuse =
			color *
			diff *
			(1.0 - metalness) *
			pointLights[i].color *
			attenuation;
		// Reflection direction
		vec3 reflectDir =
			reflect(-lightDir,normal);
		// Roughness
		float shininess =
			mix(2.0,64.0,1.0 - roughness);
		float spec =
			pow(
				max(dot(viewDir,reflectDir),0.0),
				shininess
			);
		// Metallic reflection
		vec3 specular =
			mix(vec3(1.0),color,metalness * 0.5) *
			spec *
			(1.0 + fresnel * 2.0) *
			attenuation;
		finalColor += diffuse + specular;
	}

	// Environment reflection
	finalColor +=
		envColor *
		fresnel *
		metalness *
		0.5;
	gl_FragColor =
		vec4(finalColor,1.0);
}
</script>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let camera,scene,renderer,controls,mesh,uniforms;

init();
animate();

function init(){

	camera =new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,1,1000);
	camera.position.set(0,0,100);
	scene = new THREE.Scene();
	renderer =new THREE.WebGLRenderer({antialias:true});
	renderer.physicallyCorrectLights = true;
	renderer.outputColorSpace = THREE.SRGBColorSpace;
	renderer.setSize(window.innerWidth,window.innerHeight);
	renderer.setClearColor("#048",1);

	document.body.appendChild(renderer.domElement);

	controls =new OrbitControls(camera,renderer.domElement);

	window.addEventListener('resize',onWindowResize);

	scene.add(new THREE.AmbientLight("#fff",0.3));

	const luz =new THREE.PointLight("#fff",100);
luz.position.set(200,200,200);
	scene.add(luz);

	const texture =new THREE.TextureLoader().load('img/a_number_line.png');

uniforms =
THREE.UniformsUtils.merge([
	THREE.UniformsLib["lights"],
	{
		tex:{ value:texture },

		metalness:{ value:0.95 },
		roughness:{ value:0.15 }
	}
]);

	const mat =
		new THREE.ShaderMaterial({
			uniforms:uniforms,
			vertexShader:document.getElementById('vertex_shader').textContent,
			fragmentShader:	document.getElementById('fragment_shader').textContent,
			lights:true
		});

	const geo =new THREE.SphereGeometry(30,128,128);

	mesh =new THREE.Mesh(geo,mat);
	scene.add(mesh);
}
function onWindowResize(){
	camera.aspect =window.innerWidth/window.innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize(window.innerWidth,window.innerHeight);
}

function animate(){
	requestAnimationFrame(animate);
	mesh.rotation.y += 0.02;
	controls.update();
	renderer.render(scene,camera);
}

</script>
</body>
</html>
