// **************** Extruded base

		//meshb.rotation.set(p/2,0,0);
		//scene.add(meshb);

gg.translate(23,0,0);

function cyli(r1,r2,r3,r4,cor){gg=new THREE.CylinderGeometry(r1,r2,r3,r4);;mm=new THREE.MeshStandardMaterial({color:cor});}
function matc(a,b,c,cor){gg=new THREE.BoxGeometry(a,b,c);mm=new THREE.MeshStandardMaterial({color:cor});}
function plan(a,b,cor){gg=new THREE.PlaneGeometry(a,b);mm=new THREE.MeshStandardMaterial({color:cor,side:THREE.DoubleSide});}

function animate(t){
	requestAnimationFrame(animate);
	const delta=clock.getDelta();

//ga.rotation.y -=-0.05;
//xa.rotation.x -=-0.05;
//gt.rotation.x -=-0.05;
	if(sim==0){
		desliga();
		sim=1;
	}
	if(tex[1] && tex[2] && meshb && sim==1){
		ss=tex[2].clone()
		ss.scale.setScalar(3);
		ss.position.set(-20,0,14);
		ss.rotation.set(0,p/6,p);
		ga.add(ss);
		ss=tex[1].clone();
		ss.scale.setScalar(3);
		ss.position.set(20,0,14);
		ss.rotation.set(0,-(2*p)-p/6,p);
		ga.add(ss);
		meshb.add(ga);
		meshb.rotation.set(p/2,0,0);
		scene.add(meshb);
		sim=2;
	}

	if(sim==2 && ligado==1){gbraco.rotation.x=0;gbraco.rotation.y=-0.04;sim=3;}

	if(ligado==1){gbraco.rotation.y -=delta/1000;r.rotation.y -=delta;}

	function isAudioPlaying(audio){return(audio.currentTime>0 && !audio.paused && !audio.ended && audio.readyState>2);}
	let elapsedTime=audio.currentTime;
	if(elapsedTime>196.5){gbraco.rotation.x=-0.2;gbraco.rotation.y=-0.04;}
	if(elapsedTime>197.8){audio.currentTime=0;gbraco.rotation.x=0;gbraco.rotation.y=-0.04;}
	controls.update();
	renderer.render(scene,camera);
}

function onClick(event){
	raycaster.setFromCamera(mouse,camera);
	intersects=raycaster.intersectObjects(alvos,false);
	if (intersects.length>0){
		selected=intersects[0].object;
		if(selected.name=="chi1"){desliga();ligado=0;audio.pause();}
		if(selected.name=="chi2"){liga();ligado=1;audio.play();liga();ligado=1;audio.play();}
	}
}

function onMove(event){
	document.body.style.cursor='default';
	mouse.x=event.clientX/window.innerWidth*2-1;
	mouse.y=-(event.clientY/window.innerHeight)*2+1;
	raycaster.setFromCamera(mouse,camera);
	intersects=raycaster.intersectObjects(alvos,false);
	if (intersects.length>0){document.body.style.cursor='pointer';}
}


function onTouchStart(event){
	event.preventDefault();
	const touch = event.touches[0];
	mouse.x = touch.clientX / window.innerWidth * 2 - 1;
	mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
	raycaster.setFromCamera(mouse,camera);
	intersects = raycaster.intersectObjects(alvos,false);
	if(intersects.length>0){
		selected = intersects[0].object;
		if(selected.name=="chi1"){desliga();ligado=0;audio.pause();}
		if(selected.name=="chi2"){liga();ligado=1;audio.play();}
	}
}

function onTouchMove(event){
	const touch = event.touches[0];
	mouse.x = touch.clientX / window.innerWidth * 2 - 1;
	mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
}


function liga(){if(meshb){meshb.rotation.z =-0.2;}}

function desliga(){if(meshb){meshb.rotation.z =0.2;}}

window.addEventListener("resize",() => {
	camera.aspect=innerWidth/innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize(innerWidth,innerHeight);
});

init();
animate();

document.getElementById("but").style.left=window.innerWidth-61+"px";

</script>

<script>
function toggleFullScreen(){
	if(!document.fullscreenElement){
		if(document.documentElement.requestFullscreen){
      			document.documentElement.requestFullscreen();
    		}else if(document.documentElement.mozRequestFullScreen){ // Firefox
      			document.documentElement.mozRequestFullScreen();
    		}else if(document.documentElement.webkitRequestFullscreen){ // Chrome,Safari & Opera
      			document.documentElement.webkitRequestFullscreen();
    		}else if(document.documentElement.msRequestFullscreen){ // IE/Edge
      			document.documentElement.msRequestFullscreen();
    		}
	}else{
		if(document.exitFullscreen){
			document.exitFullscreen();
		}else if(document.mozCancelFullScreen){ // Firefox
			document.mozCancelFullScreen();
		}else if(document.webkitExitFullscreen){ // Chrome,Safari & Opera
			document.webkitExitFullscreen();
		}else if(document.msExitFullscreen){ // IE/Edge
			document.msExitFullscreen();
		}
	}
}
</script>
